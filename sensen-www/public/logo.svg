<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1890ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#722ed1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle representing infinity/cycle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-dasharray="200 80" />
  <!-- Two overlapping circles representing "me" and "another me" -->
  <circle cx="40" cy="50" r="15" fill="url(#grad1)" opacity="0.8" />
  <circle cx="60" cy="50" r="15" fill="url(#grad1)" opacity="0.6" />
  <!-- Connection node -->
  <circle cx="50" cy="50" r="5" fill="#fff" />
</svg>
